root = "."
tmp_dir = "tmp"

[build]
# Rebuild plugins before the host binary so the .so files and host stay in
# sync (the Go plugin package requires identical toolchain + dependency
# versions between host and plugin). CGO is required to load .so files.
pre_cmd = ["CGO_ENABLED=1 go build -buildmode=plugin -o plugins/providers/github.so ./plugins/providers/github", "CGO_ENABLED=1 go build -buildmode=plugin -o plugins/providers/example.so ./plugins/providers/example", "CGO_ENABLED=1 go build -buildmode=plugin -o plugins/sites/docs.so ./plugins/sites/docs"]
cmd = "CGO_ENABLED=1 go build -o ./tmp/jughead ."
bin = "tmp/jughead"
# include_ext = ["go", "templ", "html", "json", "js", "ts", "css", "scss"]
include_ext = ["go", "templ"]
exclude_dir = [
  ".agents",
  ".parcel-cache",
  "bin",
  "dist",
  "node_modules",
  "plugins",
  "static",
  "tmp",
  "tests",
  "vendor",
]
exclude_regex = ["_test\\.go"]
exclude_unchanged = false
follow_symlink = false
log = "build-errors-air.log"
poll = false
poll_interval = 500
delay = 1000
stop_on_error = true
send_interrupt = false
kill_delay = 500
rerun = false
rerun_delay = 500

[log]
time = false
main_only = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = true
keep_scroll = true
